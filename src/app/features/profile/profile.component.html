<div class="container py-5">

  @if (userData()) {
  <div class="card shadow-sm mb-5">
    <div class="card-body">
      <h4 class="card-title mb-4 fw-bold">
        <i class="fa fa-user-circle me-2 text-red-300"></i> My Profile
      </h4>
      <ul class="list-group list-group-flush">
        <li class="list-group-item d-flex justify-content-between">
          <span class="text-red-800">Name</span>
          <span class="fw-semibold">{{ userData().name }}</span>
        </li>
        <li class="list-group-item">
          <a [routerLink]="['/allorders']" class="flex items-center justify-between w-full text-decoration-none group">
            <span class="text-red-800">
              <i class="fa fa-box me-2"></i> My Orders
            </span>
            <span class="fw-semibold text-gray-700 group-hover:text-red-500 transition-colors duration-200">
              View All <i class="fa fa-chevron-right text-xs ms-1"></i>
            </span>
          </a>
        </li>
      </ul>
    </div>
  </div>
  }


</div>
